apiVersion: apps/v1
kind: Deployment
metadata:
  name: zipline-orchestration-ui
  namespace: zipline-system
  labels:
    app: zipline-ui
    {{- include "zipline-orchestration.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.orchestration.ui.replicas }}
  selector:
    matchLabels:
      app: zipline-ui
  template:
    metadata:
      labels:
        app: zipline-ui
        azure.workload.identity/use: "true"
    spec:
      serviceAccountName: orchestration-sa
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
      {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: web-ui
          image: "{{ .Values.orchestration.ui.image }}:{{ .Values.global.version }}"
          env:
            - name: API_BASE_URL
              value: "http://orchestration-hub-service"
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: username
            - name: DATABASE_URL
              value: "postgres://$(DB_USERNAME)@{{.Values.database.orchestration.fqdn}}:5432/{{.Values.database.orchestration.database}}?sslmode=require"
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: password
            - name: AZURE_REGION
              value: "{{ .Values.azure.location }}"
            - name: GRAFANA_ENDPOINT
              value: "{{ .Values.azure.grafana_endpoint }}"
            - name: ORCH_CONTAINER_NAME
              value: "orchestration-hub"
            - name: AZURE_LOG_ANALYTICS_WORKSPACE_ID
              value: "{{ .Values.azure.log_analytics_workspace_id }}"
            - name: PROMETHEUS_QUERY_ENDPOINT
              value: "{{ .Values.azure.prometheus_query_endpoint }}"
            - name: PROMETHEUS_NAMESPACE
              value: "{{ .Values.azure.prometheus_namespace }}"
            - name: LOKI_URL
              value: "{{ .Values.azure.loki_endpoint }}"
            - name: AZURE_CUSTOMER_ID
              value: "{{ .Values.global.customer_name }}"
            {{- if .Values.global.deploy_fetcher }}
            - name: FETCHER_BASE_URL
              value: "http://fetcher-service"
            {{- end }}
            - name: AUTH_ENABLED
              value: "{{ .Values.auth.enabled }}"
            {{- if .Values.auth.enabled }}
            - name: AUTH_URL
              value: "{{ .Values.auth.url }}"
            - name: AUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: auth-secret
                  key: auth-secret
            - name: GOOGLE_OAUTH_CLIENT_ID
              value: "{{ .Values.auth.google_oauth_client_id }}"
            - name: GOOGLE_OAUTH_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: auth-secret
                  key: google-oauth-client-secret
            - name: GITHUB_OAUTH_CLIENT_ID
              value: "{{ .Values.auth.github_oauth_client_id }}"
            - name: GITHUB_OAUTH_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: auth-secret
                  key: github-oauth-client-secret
            - name: MICROSOFT_ENTRA_TENANT_ID
              value: "{{ .Values.auth.microsoft_entra_tenant_id }}"
            - name: MICROSOFT_ENTRA_OAUTH_CLIENT_ID
              value: "{{ .Values.auth.microsoft_entra_oauth_client_id }}"
            - name: MICROSOFT_ENTRA_OAUTH_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: auth-secret
                  key: microsoft-entra-oauth-client-secret
            - name: SSO_PROVIDER_ID
              value: "{{ .Values.auth.sso_provider_id }}"
            - name: SSO_DOMAIN
              value: "{{ .Values.auth.sso_domain }}"
            - name: SSO_ISSUER
              value: "{{ .Values.auth.sso_issuer }}"
            - name: SSO_CLIENT_ID
              value: "{{ .Values.auth.sso_client_id }}"
            - name: SSO_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: auth-secret
                  key: sso-client-secret
            {{- end }}
          volumeMounts:
            - name: secrets-store-inline
              mountPath: "/mnt/secrets-store"
              readOnly: true
          resources:
          {{- toYaml .Values.orchestration.ui.resources | nindent 12 }}
          ports:
            - containerPort: {{ .Values.orchestration.ui.port }}
      volumes:
        - name: secrets-store-inline
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: "zipline-secret-provider"
---
apiVersion: v1
kind: Service
metadata:
  name: orchestration-ui-service
  namespace: zipline-system
  labels:
    {{- include "zipline-orchestration.labels" . | nindent 4 }}
spec:
  selector:
    app: zipline-ui
  ports:
    - name: http
      port: 80
      targetPort: {{ .Values.orchestration.ui.port }}
      protocol: TCP
  type: ClusterIP
