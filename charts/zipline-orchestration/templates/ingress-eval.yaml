apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: eval-ingress
  namespace: zipline-system
  labels:
    {{- include "zipline-orchestration.labels" . | nindent 4 }}
  annotations:
    {{- with .Values.ingress.eval.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.eval.className }}
  tls:
    - hosts:
        - {{ .Values.ingress.eval.host }}
      secretName: eval-tls-secret
  rules:
    - host: {{ .Values.ingress.eval.host }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: eval-service
                port:
                  number: 80
