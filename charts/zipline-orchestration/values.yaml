# Default values for zipline-orchestration
global:
  customer_name: ""
  artifact_prefix: ""
  version: ""
  deploy_fetcher: false

# Cosmos DB configuration
cosmos:
  table_partitions_dataset: ""
  data_quality_metrics_dataset: ""

# Azure configuration
azure:
  location: ""
  storage_account_name: ""
  storage_account_key: ""
  warehouse_container_name: ""
  log_analytics_workspace_id: ""
  loki_endpoint: ""
  prometheus_query_endpoint: ""
  prometheus_namespace: ""
  grafana_endpoint: ""

# Service account configuration
workloadIdentity:
  enabled: true
  clientId: ""

keyvault:
  name: ""
  tenantId: ""
  userAssignedIdentityID: ""

kyuubi:
  host: ""
  port: ""
  credentials:
    enabled: false
    username_secret: ""
    password_secret: ""

# Spark History Server configuration
spark:
  historyServerUrl: ""

# Domain configuration for SSL certificates
domains:
  ziplineUI: ""
  hub: ""

# Static IP addresses (will be created by Terraform)
staticIPs:
  orchestrationUI: ""
  orchestrationUIName: ""
  orchestrationHub: ""
  orchestrationHubName: ""
  orchestrationEval: ""
  orchestrationEvalName: ""


# Orchestration services configuration
orchestration:
  hub:
    image: "ziplineai/hub-azure"
    replicas: 1
    port: 3903
    resources:
      limits:
        cpu: "6"
        memory: "28Gi"

  ui:
    image: "ziplineai/web-ui"
    replicas: 1
    port: 3000
    resources:
      limits:
        cpu: "1000m"
        memory: "1Gi"

  fetcher:
    image: "ziplineai/chronon-fetcher"
    replicas: 3
    port: 9000
    resources:
      limits:
        cpu: "4"
        memory: "16Gi"
      requests:
        cpu: "4"
        memory: "16Gi"

  eval:
    image: "ziplineai/eval-azure"
    replicas: 1
    port: 3904
    resources:
      requests:
        cpu: "500m"
        memory: "4Gi"
      limits:
        cpu: "2"
        memory: "8Gi"

# Ingress configuration

# Ingress NGINX for UI
ingress-nginx-ui:
  enabled: true
  controller:
    ingressClassResource:
      name: nginx-ui
      enabled: true
      default: false
      controllerValue: "k8s.io/ingress-nginx-ui"
    ingressClass: nginx-ui
    service:
      loadBalancerIP: ""  # Set by Terraform
      annotations:
        service.beta.kubernetes.io/azure-load-balancer-resource-group: ""  # Set by Terraform
    # Important: Use different election IDs to avoid conflicts
    electionID: ingress-controller-leader-ui
    # Use a specific namespace or use different suffixes
    namespaceOverride: ingress-nginx-ui

# Ingress NGINX for Eval
ingress-nginx-eval:
  enabled: true
  controller:
    ingressClassResource:
      name: nginx-eval
      enabled: true
      default: false
      controllerValue: "k8s.io/ingress-nginx-eval"
    ingressClass: nginx-eval
    service:
      loadBalancerIP: ""  # Set by Terraform
      annotations:
        service.beta.kubernetes.io/azure-load-balancer-resource-group: ""  # Set by Terraform
    electionID: ingress-controller-leader-eval
    namespaceOverride: ingress-nginx-eval

# Ingress NGINX for Hub
ingress-nginx-hub:
  enabled: true
  controller:
    ingressClassResource:
      name: nginx-hub
      enabled: true
      default: false
      controllerValue: "k8s.io/ingress-nginx-hub"
    ingressClass: nginx-hub
    service:
      loadBalancerIP: ""  # Set by Terraform
      annotations:
        service.beta.kubernetes.io/azure-load-balancer-resource-group: ""  # Set by Terraform
        service.beta.kubernetes.io/azure-load-balancer-health-probe-request-path: "/ping"
    # Important: Different election ID
    electionID: ingress-controller-leader-hub
    # Different namespace
    namespaceOverride: ingress-nginx-hub

ingress:
  ui:
    className: nginx-ui
    host: ""
    annotations:
      cert-manager.io/cluster-issuer: "letsencrypt-prod"
  hub:
    className: nginx-hub
    host: ""
    annotations:
      nginx.ingress.kubernetes.io/health-check-path: "/ping"
      nginx.ingress.kubernetes.io/proxy-body-size: "20m"
      cert-manager.io/cluster-issuer: "letsencrypt-prod"
  eval:
    className: nginx-eval
    host: ""
    annotations:
      cert-manager.io/cluster-issuer: "letsencrypt-prod"

database:
  orchestration:
    fqdn: ""
    database: "execution-info"

certManager:
  enabled: true
  installCRDs: true

# Let's Encrypt configuration
clusterIssuer:
  enabled: true
  email: ""
  server: "https://acme-v02.api.letsencrypt.org/directory"


# Flink on AKS configuration
flink:
  aksServiceAccount: ""
  aksNamespace: ""
  image: ""
  azureClientId: ""
  azureTenantId: ""

imagePullSecrets:
  - name: my-registry-key

# Zipline Authentication Configuration
auth:
  enabled: false
  url: ""
  secret: ""
  jwksUrl: ""
  google_oauth_client_id: ""
  github_oauth_client_id: ""
  microsoft_entra_tenant_id: ""
  microsoft_entra_oauth_client_id: ""
  sso_provider_id: ""
  sso_domain: ""
  sso_issuer: ""
  sso_client_id: ""