apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "spark-history-server.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "spark-history-server.labels" . | nindent 4 }}
data:
  spark-defaults.conf: |
    # Prepend Azure jars to ensure Hadoop 3.4.1 classes load first
    spark.driver.extraClassPath=/azure-jars/*
    spark.history.fs.logDirectory={{ .Values.azure.eventLogDir }}
    spark.history.fs.update.interval={{ .Values.historyServer.updateInterval }}
    spark.history.retainedApplications={{ .Values.historyServer.maxApplications }}
    {{- if .Values.historyServer.enableIncompleteEvents }}
    spark.history.fs.inProgressOptimization.enabled=true
    {{- end }}
    {{- if .Values.historyServer.cleaner.enabled }}
    spark.history.fs.cleaner.enabled=true
    spark.history.fs.cleaner.interval={{ .Values.historyServer.cleaner.interval }}
    spark.history.fs.cleaner.maxAge={{ .Values.historyServer.cleaner.maxAge }}
    {{- end }}
    # Azure ABFS OAuth with Workload Identity
    spark.hadoop.fs.azure.account.auth.type.{{ .Values.azure.storageAccountName }}.dfs.core.windows.net=OAuth
    spark.hadoop.fs.azure.account.oauth.provider.type.{{ .Values.azure.storageAccountName }}.dfs.core.windows.net=org.apache.hadoop.fs.azurebfs.oauth2.WorkloadIdentityTokenProvider
    spark.hadoop.fs.azure.account.oauth2.client.id.{{ .Values.azure.storageAccountName }}.dfs.core.windows.net={{ .Values.azure.clientId }}
    spark.hadoop.fs.azure.account.oauth2.msi.tenant={{ .Values.azure.tenantId }}
    spark.hadoop.fs.azure.fedauth.oauth2.token.file=/var/run/secrets/azure/tokens/azure-identity-token
  core-site.xml: |
    <?xml version="1.0"?>
    <configuration>
      <!-- Azure ABFS OAuth with Workload Identity - matches Kyuubi config -->
      <property>
        <name>fs.azure.account.auth.type.{{ .Values.azure.storageAccountName }}.dfs.core.windows.net</name>
        <value>OAuth</value>
      </property>
      <property>
        <name>fs.azure.account.oauth.provider.type.{{ .Values.azure.storageAccountName }}.dfs.core.windows.net</name>
        <value>org.apache.hadoop.fs.azurebfs.oauth2.WorkloadIdentityTokenProvider</value>
      </property>
      <property>
        <name>fs.azure.account.oauth2.client.id.{{ .Values.azure.storageAccountName }}.dfs.core.windows.net</name>
        <value>{{ .Values.azure.clientId }}</value>
      </property>
      <property>
        <name>fs.azure.account.oauth2.msi.tenant</name>
        <value>{{ .Values.azure.tenantId }}</value>
      </property>
      <property>
        <name>fs.azure.fedauth.oauth2.token.file</name>
        <value>/var/run/secrets/azure/tokens/azure-identity-token</value>
      </property>
    </configuration>
